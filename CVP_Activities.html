<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cardiovascular &amp; Pulmonary Responses to Exercise — In-Class Activities</title>
<style>
  :root{
    --accent:#9e1b32;
    --accent-dark:#6e1223;
    --bg:#f5f4f2;
    --panel:#ffffff;
    --ink:#26221f;
    --muted:#6b6560;
    --border:#e0dcd6;
    --green:#2e7d32;
    --amber:#b8860b;
    --red:#b3261e;
    --blue:#2f6fed;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
  }
  .app{
    display:grid;
    grid-template-columns:270px 1fr;
    min-height:100vh;
  }
  .sidebar{
    background:linear-gradient(180deg,var(--accent-dark),var(--accent));
    color:#fff;
    padding:22px 18px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }
  .sidebar h1{
    font-size:16px;
    line-height:1.35;
    margin:0 0 4px 0;
    font-weight:700;
  }
  .sidebar .sub{
    font-size:12px;
    opacity:0.85;
    margin-top:-10px;
  }
  #navList{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  #navList li{
    padding:9px 10px;
    border-radius:8px;
    font-size:13.5px;
    cursor:pointer;
    display:flex;
    gap:8px;
    align-items:flex-start;
    background:rgba(255,255,255,0.06);
    transition:background .15s;
  }
  #navList li:hover{background:rgba(255,255,255,0.16);}
  #navList li.active{background:rgba(255,255,255,0.28);font-weight:600;}
  #navList li .num{
    flex:0 0 auto;
    width:20px;height:20px;
    border-radius:50%;
    background:rgba(255,255,255,0.25);
    display:flex;align-items:center;justify-content:center;
    font-size:11px;
  }
  .content{
    padding:30px 40px 60px;
    max-width:920px;
  }
  .progress{
    font-size:12.5px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-bottom:6px;
  }
  #screen h2{
    margin:0 0 4px 0;
    font-size:24px;
  }
  #screen .meta{
    color:var(--muted);
    font-size:13.5px;
    margin-bottom:18px;
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px 22px;
    margin-bottom:16px;
  }
  .panel h3{margin-top:0;font-size:14.5px;color:var(--accent-dark);}
  .panel ul{margin:8px 0;padding-left:20px;}
  .panel li{margin-bottom:4px;font-size:14px;}
  .prompt{
    background:#fbf3ef;
    border-left:4px solid var(--accent);
    padding:12px 16px;
    border-radius:0 8px 8px 0;
    font-size:14px;
    margin-bottom:16px;
  }
  .background-box{
    background:#eef4fb;
    border-left:4px solid var(--blue);
    padding:12px 16px;
    border-radius:0 8px 8px 0;
    font-size:13.5px;
    margin-bottom:14px;
  }
  .background-box strong{color:#1d4ea8;}
  .refbox{
    background:#f7f5f2;
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 14px;
    font-size:13px;
    margin-bottom:14px;
    display:none;
  }
  .refbox.show{display:block;}
  .refbox div{margin-bottom:4px;}
  textarea{
    width:100%;
    min-height:80px;
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px;
    font-family:inherit;
    font-size:14px;
    resize:vertical;
  }
  button.action{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:9px 16px;
    border-radius:8px;
    font-size:13.5px;
    cursor:pointer;
    margin-top:8px;
  }
  button.action:hover{background:var(--accent-dark);}
  button.action:disabled{opacity:.4;cursor:not-allowed;}
  button.ghost{
    background:none;
    border:1px solid var(--border);
    padding:8px 14px;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
    margin-top:8px;
    margin-left:6px;
    color:var(--ink);
  }
  button.ghost:hover{background:#eee;}
  .nav-buttons{
    display:flex;
    justify-content:space-between;
    margin-top:24px;
  }
  .nav-buttons button{
    background:var(--panel);
    border:1px solid var(--border);
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
  }
  .nav-buttons button:hover{background:#efece8;}
  .nav-buttons button:disabled{opacity:.4;cursor:not-allowed;}

  /* Activity 1: predict */
  .canvas-row{display:flex;gap:16px;flex-wrap:wrap;}
  .canvas-block{text-align:center;}
  .canvas-block canvas{
    border:1px solid var(--border);
    border-radius:8px;
    background:#fff;
    touch-action:none;
    cursor:crosshair;
  }
  .canvas-block .cb-label{font-size:12.5px;color:var(--muted);margin-top:4px;}

  /* Activity 2: HR lab */
  table.hrtable{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.hrtable th, table.hrtable td{border:1px solid var(--border);padding:5px;text-align:center;}
  table.hrtable input{width:52px;padding:4px;border:1px solid var(--border);border-radius:5px;text-align:center;}
  .table-scroll{overflow-x:auto;padding-bottom:4px;}
  .chart-wrap{margin-top:14px;}
  .legend{font-size:12px;color:var(--muted);margin-top:4px;}
  .legend span{display:inline-flex;align-items:center;gap:5px;margin-right:14px;}
  .swatch{width:12px;height:3px;display:inline-block;border-radius:2px;}
  .metric-box{
    display:inline-block;
    background:#f7f5f2;
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 14px;
    margin-top:12px;
    font-size:13.5px;
  }
  .metric-box .val{font-size:20px;font-weight:700;color:var(--accent-dark);}
  .flag-note{font-size:12px;color:var(--red);margin-top:4px;display:none;}
  .flag-note.show{display:block;}

  /* Activity 3: cases */
  .case-progress{font-size:12.5px;color:var(--muted);margin-bottom:10px;}
  .case-card{
    border:1px solid var(--border);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:10px;
    background:#fff;
  }
  .case-card.correct{border-color:var(--green);background:#f2f8f1;}
  .case-card.incorrect{border-color:var(--red);background:#fbf1f0;}
  .case-text{font-size:14.5px;margin-bottom:10px;}
  .case-choices{display:flex;gap:6px;flex-wrap:wrap;}
  .case-choices button{
    border:1px solid var(--border);
    background:#fff;
    padding:8px 12px;
    border-radius:6px;
    font-size:13px;
    cursor:pointer;
  }
  .case-choices button.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
  .case-explain{font-size:12.5px;color:var(--muted);margin-top:10px;display:none;}
  .case-card.revealed .case-explain{display:block;}
  .summary-row{
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 14px;
    margin-bottom:8px;
    font-size:12.5px;
  }
  .summary-row.correct{border-color:var(--green);background:#f2f8f1;}
  .summary-row.incorrect{border-color:var(--red);background:#fbf1f0;}
  .score-banner{
    font-size:16px;
    font-weight:700;
    color:var(--accent-dark);
    margin-bottom:14px;
  }
  .case-actions{
    display:flex;
    justify-content:space-between;
    max-width:400px;
    margin-top:16px;
  }
  .term{
    color:var(--blue);
    text-decoration:underline dotted;
    cursor:pointer;
    font-weight:600;
  }
  .term:hover, .term:focus{color:#1d4ea8;}
  .useful-info .term-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
  .useful-info .term-chip{
    border:1px solid var(--blue);
    background:#eef4fb;
    color:#1d4ea8;
    padding:6px 11px;
    border-radius:20px;
    font-size:12.5px;
    cursor:pointer;
  }
  .useful-info .term-chip.opened{background:#1d4ea8;color:#fff;}
  .term-def{
    display:none;
    font-size:13px;
    background:#eef4fb;
    border-left:4px solid var(--blue);
    padding:10px 14px;
    border-radius:0 8px 8px 0;
    margin-bottom:8px;
  }
  .term-def.open{display:block;}

  /* Activity 4: VT graphs */
  .patient-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .patient-tabs button{
    border:1px solid var(--border);background:#fff;padding:7px 12px;border-radius:20px;font-size:13px;cursor:pointer;
  }
  .patient-tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
  svg.vegraph{background:#fff;border:1px solid var(--border);border-radius:8px;width:100%;height:auto;}
  .graph-explain{font-size:13px;margin-top:10px;background:#f7f5f2;padding:10px 12px;border-radius:8px;display:none;}
  .graph-explain.show{display:block;}
  .mystery-table{font-size:12px;border-collapse:collapse;margin-bottom:10px;}
  .mystery-table th,.mystery-table td{border:1px solid var(--border);padding:3px 6px;text-align:center;}
  .patient-vignette{font-size:13px;background:#f7f5f2;border-left:4px solid var(--accent);padding:8px 12px;border-radius:0 8px 8px 0;margin-bottom:10px;}
  .patient-vignette b{color:var(--accent);}

  /* Activity 5: jigsaw */
  .flip-row{display:flex;gap:14px;flex-wrap:wrap;}
  .flip-card{
    flex:1 1 220px;
    min-height:150px;
    border:1px solid var(--border);
    border-radius:10px;
    padding:14px;
    cursor:pointer;
    background:#fff;
    transition:background .15s;
  }
  .flip-card:hover{background:#faf7f4;}
  .flip-card h4{margin:0 0 8px 0;font-size:14px;color:var(--accent-dark);}
  .flip-card p{font-size:13px;margin:0;line-height:1.5;}
  .flip-card .hint{font-size:11.5px;color:var(--muted);}
  .sort-item{
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    margin-bottom:8px;
    background:#fff;
  }
  .sort-item.correct{border-color:var(--green);background:#f2f8f1;}
  .sort-item.incorrect{border-color:var(--red);background:#fbf1f0;}
  .sort-item .txt{font-size:13.5px;margin-bottom:6px;}
  .sort-item .choices button{
    border:1px solid var(--border);background:#fff;padding:5px 10px;border-radius:6px;font-size:12px;cursor:pointer;margin-right:5px;
  }
  .sort-item .choices button.selected{background:var(--accent);color:#fff;border-color:var(--accent);}
  .sort-explain{font-size:12px;color:var(--muted);margin-top:6px;display:none;}
  .sort-item.revealed .sort-explain{display:block;}

  /* Activity 6: role play */
  .checklist label{
    display:flex;align-items:center;gap:8px;font-size:14px;padding:6px 0;border-bottom:1px solid var(--border);
  }
  .checklist input{width:16px;height:16px;}

  /* Lock screens */
  .lock-panel{text-align:center;padding:36px 22px;}
  .lock-panel .lock-icon{font-size:32px;margin-bottom:10px;}
  .lock-row{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}
  .lock-row input{
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    font-size:14px;
    width:200px;
    text-align:center;
    letter-spacing:.05em;
  }
  .lock-error{color:var(--red);font-size:13px;margin-top:10px;min-height:16px;}
  #navList li.locked{opacity:.7;}
  #navList li .lockmark{margin-left:auto;font-size:11px;opacity:.8;}

  footer.printnote{font-size:11.5px;color:var(--muted);margin-top:26px;text-align:center;}

  /* Touch-friendly targets for tablet use */
  button, .term, .term-chip, svg.vegraph, #navList li{
    touch-action:manipulation;
  }
  .term{padding:1px 3px;}
  .table-scroll{-webkit-overflow-scrolling:touch;}

  @media (max-width:900px){
    .app{grid-template-columns:1fr;}
    .sidebar{flex-direction:row;flex-wrap:wrap;}
    #navList{flex-direction:row;flex-wrap:wrap;}
    .content{padding:20px;}
  }
</style>
</head>
<body>
<div class="app">
  <nav class="sidebar">
    <div>
      <h1>CV &amp; Pulmonary Responses to Exercise</h1>
      <div class="sub">In-class activity sequence</div>
    </div>
    <ol id="navList"></ol>
  </nav>

  <main class="content">
    <div class="progress">Activity <span id="stepNum">1</span> of <span id="stepTotal">7</span></div>
    <section id="screen"></section>
    <div class="nav-buttons">
      <button id="prevBtn">&larr; Previous</button>
      <button id="nextBtn">Next &rarr;</button>
    </div>
    <footer class="printnote">DPTD 732 — Foundational Movement Science · Cardiovascular &amp; Pulmonary Responses to Exercise</footer>
  </main>
</div>

<script>
/* ---------------------------------------------------------
   Section passwords
   Read these off to students in your lecture slides as you reach
   each activity. Edit the values below to change them.
--------------------------------------------------------- */
const activityPasswords = {
  predict:     "PREDICT",
  hrlab:       "STARLING",
  cases:       "REDFLAG",
  vtstations:  "THRESHOLD",
  jigsaw:      "BRADYCARDIA",
  roleplay:    "VALSALVA",
  exit:        "WRAPUP"
};

/* ---------------------------------------------------------
   State
--------------------------------------------------------- */
const hrTimeLabels = ["Rest 0:00","Rest 1:00","Ex 0:30","Ex 1:00","Ex 1:30","Ex 2:00","Ex 2:30","Ex 3:00","Rec 0:30","Rec 1:00","Rec 1:30","Rec 2:00","Rec 3:00","Rec 4:00"];
const hrReference =   [ 74,        76,         98,       118,      132,      140,      145,      148,      128,       112,       100,       92,        84,        78];

const state = {
  hrLab: Array(hrTimeLabels.length).fill(""),
  cases: {},          // id -> chosen answer
  caseIndex: 0,
  caseFinished: false,
  caseShowRef: false,
  termOpen: {},        // "caseId|term" -> true/false
  hrShowRef: true,
  vt: { patient: "A", marks: {A:[], B:[], C:[], D:[], E:[]}, revealed: {A:false,B:false,C:false,D:false,E:false} },
  jigsawFlipped: {central:false, peripheral:false, neural:false},
  jigsawSort: {},      // idx -> chosen category
  jigsawSortRevealed: false,
  jigsawAnswer: "",
  jigsawTransfer: "",
  roleplayChecks: {},
  rpReflect:"",
  rpCompare:"",
  exitAnswer: "",
  exitStretchOpen:false,
  exitStretchAnswer:"",
  unlocked: {}
};

/* ---------------------------------------------------------
   Data
--------------------------------------------------------- */
function veCurve(vt1, vt2, maxX){
  const pts = [];
  for(let x=0;x<=maxX;x+=0.25){
    let y;
    if(x<vt1) y = 20 + x*4;
    else if(x<vt2) y = 20 + vt1*4 + (x-vt1)*10;
    else y = 20 + vt1*4 + (vt2-vt1)*10 + (x-vt2)*20;
    pts.push({x, y});
  }
  return pts;
}
const patients = {
  A: {label:"Patient A — Endurance-Trained", vignette:"28-year-old competitive marathon runner, tested during a pre-season fitness assessment. Trains 6 days/week.", vt1:6,   vt2:8.5, note:"Trained athletes push both thresholds farther right — superior buffering capacity and oxygen extraction let them sustain higher relative workloads before hyperventilating.", mystery:false},
  B: {label:"Patient B — Deconditioned",      vignette:"50-year-old with a sedentary desk job and no regular exercise history, tested at the start of a new wellness program.", vt1:3,   vt2:5,   note:"Lower thresholds mean lactate accumulates and buffering is overwhelmed at much lower absolute workloads — expect this patient to reach VT2 early in a graded test.", mystery:false},
  C: {label:"Patient C — Recreationally Active", vignette:"34-year-old recreational cyclist who rides 2-3 times a week, tested for a general fitness baseline.", vt1:4.5, vt2:7, note:"A middle-of-the-road profile — useful reference point for comparing the trained and deconditioned patients.", mystery:false},
  D: {label:"Patient D — Mystery Patient", vignette:"60-year-old referred for an exercise tolerance test ahead of a rehab program. Diagnosis intentionally withheld — you'll figure out what's going on with this patient from the data pattern alone, not from the label.", vt1:2, vt2:3.5, note:"Thresholds compress close together and occur early — ventilatory limitation, not cardiac output, is likely the limiting factor for this patient's exercise tolerance (a pattern consistent with a condition like COPD).", mystery:true}
};
const trainingZoneNote = "Clinical tie-in: below VT1 is an easy/recovery training zone, VT1–VT2 is a sustainable 'tempo' zone, and above VT2 is only sustainable for very short durations. These thresholds are how you'd set aerobic training zones for a real patient.";

const glossary = {
  CAD: "<strong>CAD (Coronary Artery Disease):</strong> narrowing of the arteries that supply the heart muscle itself with blood, which can limit how much oxygen the heart receives during exertion.",
  RPE: "<strong>RPE (Rating of Perceived Exertion):</strong> a patient's own subjective rating of how hard they feel they're working, typically on a 6–20 (Borg) scale. Useful when HR can't be trusted as an intensity marker.",
  MI: "<strong>MI (Myocardial Infarction):</strong> a heart attack — death of heart muscle tissue caused by a blocked blood supply to that area.",
  REHAB: "<strong>Cardiac Rehab:</strong> a supervised exercise and education program for patients recovering from a cardiac event (like an MI), aimed at safely rebuilding exercise tolerance under monitoring.",
  BETA: "<strong>Beta-Blocker:</strong> a medication that blocks sympathetic (beta-adrenergic) stimulation of the heart — one of the two main drivers of the normal exercise HR rise. Blunts HR response to exercise.",
  ARRHYTHMIA: "<strong>Arrhythmia:</strong> an abnormal heart rhythm — too fast, too slow, or irregular.",
  NEURO: "<strong>Cardiac Autonomic Neuropathy:</strong> nerve damage affecting the autonomic nervous system, impairing the body's ability to appropriately adjust HR and BP during exercise.",
  T1D: "<strong>Type 1 Diabetes:</strong> an autoimmune condition where the pancreas produces little or no insulin. Long-standing cases can lead to nerve damage, including autonomic neuropathy."
};
function term(display, key){
  return `<span class="term" data-term="${key}" tabindex="0" role="button">${display}</span>`;
}
const cases = [
  {id:1, text:"45-year-old healthy adult, no cardiac history. During a graded exercise test, SBP rises steadily from 120→170 mmHg; DBP stays stable around 78 mmHg throughout.", answer:"normal", explain:"Classic normal response — SBP rises roughly linearly with workload because cardiac output has to climb to meet the muscles' oxygen demand, and the arterial system reflects that with a higher systolic pressure. DBP stays essentially flat because arterioles in the working muscle dilate and lower total peripheral resistance, roughly offsetting the pressure increase — this decoupling of SBP and DBP is exactly what a healthy exercise pressor response looks like.", terms:[]},
  {id:2, text:`60-year-old with known ${term("CAD","CAD")}. SBP rises from 130→135 mmHg then plateaus and begins to fall as workload continues to increase; patient reports dizziness.`, answer:"stop", explain:"Exertional hypotension — a failure of SBP to rise, or an actual drop, as workload increases. In CAD, narrowed coronary arteries limit how much blood (and oxygen) the heart muscle itself can receive as demand climbs; at some point contractility and stroke volume can't keep pace, so cardiac output — and SBP — plateau and fall even though the body is asking for more. Combined with dizziness (a sign of falling cerebral perfusion), this is an ACSM-recognized indication to terminate exercise immediately.", terms:["CAD"]},
  {id:3, text:"30-year-old healthy athlete. DBP rises from 80→98 mmHg (an 18 mmHg increase) over the course of an incremental test.", answer:"caution", explain:"DBP increase >10–15 mmHg is atypical. Normally, vasodilation in the working muscle lowers total peripheral resistance enough that DBP stays flat or even drops slightly as workload rises. An 18 mmHg climb suggests that vasodilation isn't happening as expected — possibly early vascular dysfunction, even in an otherwise healthy young athlete. It's not an immediate stop like a failure of SBP to rise, but it's atypical enough to flag for closer monitoring and follow-up.", terms:[]},
  {id:4, text:`55-year-old with treated hypertension. SBP rises from 150→190 mmHg at a moderate workload; ${term("RPE","RPE")} reported as 13 ("somewhat hard").`, answer:"normal", explain:"Still a proportional, linear SBP rise with workload — no plateau, no fall, and no abnormal DBP spike. The elevated starting point and peak reflect her baseline hypertension shifting the whole curve upward, not a dangerous pattern in itself. RPE 13 ('somewhat hard') is a reasonable, expected effort rating at that workload. Continue with normal monitoring — treated hypertension changes the numbers you'd expect, not the shape of a healthy response.", terms:["RPE"]},
  {id:5, text:"25-year-old healthy adult begins light jogging. HR jumps from 70→95 bpm within the first 5 seconds, before any real metabolic demand could explain it.", answer:"normal", explain:"This is the expected anticipatory response at exercise onset — HR rises via vagal withdrawal (and sometimes even starts before movement, from central/cortical anticipation) faster than any chemical or mechanical feedback from the muscles could explain. It's a feedforward mechanism, not a red flag: true metabolic demand hasn't caught up yet, but the nervous system is already preparing the cardiovascular system for it.", terms:[]},
  {id:6, text:`50-year-old in ${term("cardiac rehab","REHAB")} post-${term("MI","MI")}. During a submax test, SBP drops from 140→110 mmHg as workload increases from moderate to vigorous; patient becomes pale and lightheaded.`, answer:"stop", explain:"Exertional hypotension with symptoms (pallor, lightheadedness) — stop exercise immediately and follow your facility's emergency protocol. This is the same underlying pattern as Case 2 (SBP falling instead of rising with workload), but it's higher-stakes here: a post-MI heart has reduced contractile reserve to begin with, so a falling SBP signals the heart is being pushed past what its remaining function can support, raising real risk of ischemia or arrhythmia.", terms:["REHAB","MI"]},
  {id:7, text:"35-year-old healthy adult on a 45-minute run at constant pace. HR drifts from 130→155 bpm over the run while workload stays the same; SV gradually decreases.", answer:"normal", explain:"Classic cardiovascular drift. As plasma volume gradually falls from sweating, venous return and end-diastolic volume fall too, so stroke volume drifts down via the Frank-Starling mechanism. Cardiac output is preserved because HR climbs to compensate for the falling SV — that's why this isn't a red flag. It's an expected consequence of sustained, moderate-duration exercise; a hydration reminder is appropriate, but it's not a stop signal.", terms:[]},
  {id:8, text:"65-year-old adult. DBP increases only 5 mmHg across a full graded exercise test while SBP rises appropriately with workload; no symptoms reported.", answer:"normal", explain:"A DBP change of only 5 mmHg across a full graded test is well within normal limits (under the ~10–15 mmHg threshold that would raise concern). Paired with an appropriately rising SBP and no symptoms, this is about as textbook a normal pressor response as you'll see — a useful contrast case against #3.", terms:[]},
  {id:9, text:`58-year-old with a history of ${term("arrhythmia","ARRHYTHMIA")}, taking a ${term("beta-blocker","BETA")} (metoprolol). During a graded exercise test, HR only rises from 65→95 bpm despite the patient reaching a heavy workload and ${term("RPE","RPE")} of 16.`,
     background:"<strong>Background — beta-blockers:</strong> these medications block sympathetic (beta-adrenergic) stimulation of the heart, which is one of the two main drivers of the normal exercise HR rise. For patients on beta-blockers, HR climbs much less than expected for a given workload — so HR is not a reliable way to gauge exercise intensity for them.",
     answer:"caution", explain:"This blunted HR rise is an expected pharmacologic effect of beta-blockade, not a cardiac red flag on its own — but it means HR-based intensity targets (like target HR zones) are unreliable for this patient. Use RPE or workload-based prescription instead. Don't confuse this with exertional hypotension: what actually matters for that call is SBP behavior, which isn't described as abnormal here.", terms:["ARRHYTHMIA","BETA","RPE"]},

      `;
      const zones = ["Rest","Exercise","Recovery"];
      function setupCanvas(id){
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext("2d");
        drawBase();
        function drawBase(){
          ctx.clearRect(0,0,canvas.width,canvas.height);
          ctx.fillStyle="#faf8f6";
          ctx.fillRect(0,0,canvas.width,canvas.height);
          const w3 = canvas.width/3;
          ctx.strokeStyle="#e0dcd6";
          ctx.beginPath();
          ctx.moveTo(w3,0); ctx.lineTo(w3,canvas.height);
          ctx.moveTo(w3*2,0); ctx.lineTo(w3*2,canvas.height);
          ctx.stroke();
          ctx.fillStyle="#a09a92";
          ctx.font="9px sans-serif";
          zones.forEach((z,i)=> ctx.fillText(z, w3*i+6, 12));
          ctx.strokeStyle="#8a847c";
          ctx.beginPath();
          ctx.moveTo(4,canvas.height-4); ctx.lineTo(canvas.width-4,canvas.height-4);
          ctx.moveTo(4,4); ctx.lineTo(4,canvas.height-4);
          ctx.stroke();
        }
        let drawing=false;
        function pos(e){
          const r = canvas.getBoundingClientRect();
          const cx = (e.touches? e.touches[0].clientX : e.clientX) - r.left;
          const cy = (e.touches? e.touches[0].clientY : e.clientY) - r.top;
          return [cx,cy];
        }
        function start(e){ drawing=true; const [x,y]=pos(e); ctx.beginPath(); ctx.moveTo(x,y); ctx.strokeStyle="#9e1b32"; ctx.lineWidth=2.5; e.preventDefault();}
        function move(e){ if(!drawing) return; const [x,y]=pos(e); ctx.lineTo(x,y); ctx.stroke(); e.preventDefault();}
        function end(){ drawing=false; }
        canvas.addEventListener("mousedown",start);
        canvas.addEventListener("mousemove",move);
        window.addEventListener("mouseup",end);
        canvas.addEventListener("touchstart",start);
        canvas.addEventListener("touchmove",move);
        canvas.addEventListener("touchend",end);
        return drawBase;
      }

        if(state.vt.marks[pid].length>=2) return;
        const r = svg.getBoundingClientRect();
        const px = ((e.clientX - r.left)/r.width)*w;
        let x = invX(px);
        x = Math.max(0, Math.min(maxX, x));
        state.vt.marks[pid].push(x);
        draw();
      });
      document.getElementById("revealVT").onclick = ()=>{ state.vt.revealed[state.vt.patient]=true; draw(); };
      document.getElementById("clearVT").onclick = ()=>{ state.vt.marks[state.vt.patient]=[]; state.vt.revealed[state.vt.patient]=false; draw(); };
    }
  },
  {
    id:"jigsaw", title:"Adaptation Jigsaw", duration:10,
    render(el){
      el.innerHTML = `
        <h2>5 · Chronic Adaptation Jigsaw</h2>
        <div class="meta">Expert groups &rarr; mixed groups</div>
        <div class="panel">
          <h3>What do these three categories mean?</h3>
          <ul>
            <li><strong>Central</strong> — changes to the heart itself: the chambers and muscle wall remodeling with training.</li>
            <li><strong>Peripheral</strong> — changes out in the tissues: the muscles, capillaries, mitochondria, and blood vessels that receive and use the blood the heart pumps.</li>
            <li><strong>Neural</strong> — changes in autonomic nervous system balance: how much sympathetic vs. parasympathetic tone is acting on the heart at rest.</li>
          </ul>
        </div>
        <div class="prompt">Step 1 — as a full group, sort each adaptation below into Central, Peripheral, or Neural using the definitions above. Discuss before you click.</div>
        <div class="panel" id="sortPanel"></div>
        <button class="action" id="checkSort">Check My Sort</button>
        <div class="prompt" style="margin-top:18px;">Step 2 — go to your expert card (Central / Peripheral / Neural) and click to reveal the underlying mechanism. Prepare a 60-second explanation, then regroup with one expert from each area.</div>
        <div class="flip-row">
          <div class="flip-card" id="card-central">
            <h4>Central — Cardiac Remodeling</h4>
            <p id="central-text" class="hint">Click to reveal</p>
          </div>
          <div class="flip-card" id="card-peripheral">
            <h4>Peripheral — Capillaries &amp; Mitochondria</h4>
            <p id="peripheral-text" class="hint">Click to reveal</p>
          </div>
          <div class="flip-card" id="card-neural">
            <h4>Neural — Autonomic Balance</h4>
            <p id="neural-text" class="hint">Click to reveal</p>
          </div>
        </div>
        <div class="panel" style="margin-top:16px;">
          <h3>Mixed-group synthesis</h3>
          <div class="prompt">Using all three mechanisms, explain why a trained patient's resting HR might be 52 bpm instead of 72 bpm.</div>
          <textarea id="jigsawAnswer" placeholder="Type your group's synthesis here...">${state.jigsawAnswer}</textarea>
        </div>
        <div class="panel">
          <h3>Transfer question</h3>
          <div class="prompt">Now apply the same three mechanisms to a different variable: explain why stroke volume increases more than resting heart rate decreases in a highly trained endurance athlete.</div>
          <textarea id="jigsawTransfer" placeholder="Type your group's answer here...">${state.jigsawTransfer}</textarea>
        </div>
      `;
      const sortPanel = document.getElementById("sortPanel");
      sortPanel.innerHTML = jigsawSortItems.map((item,i)=>{
        const chosen = state.jigsawSort[i];
        const revealed = state.jigsawSortRevealed;
        const cls = revealed ? (chosen===item.cat ? "correct":"incorrect") : "";
        return `<div class="sort-item ${cls} ${revealed?'revealed':''}" data-i="${i}">
          <div class="txt">${item.text}</div>
          <div class="choices">
            ${Object.keys(jigsawCatLabels).map(k=>`<button data-cat="${k}" class="${chosen===k?'selected':''}">${jigsawCatLabels[k]}</button>`).join("")}
          </div>
          <div class="sort-explain">${item.explain}</div>
        </div>`;
      }).join("");
      sortPanel.querySelectorAll(".sort-item").forEach(row=>{
        const i = +row.dataset.i;
        row.querySelectorAll("button").forEach(btn=>{
          btn.addEventListener("click", ()=>{
            state.jigsawSort[i] = btn.dataset.cat;
            row.querySelectorAll("button").forEach(b=>b.classList.remove("selected"));
            btn.classList.add("selected");
            if(state.jigsawSortRevealed){
              row.classList.remove("correct","incorrect");
              row.classList.add(state.jigsawSort[i]===jigsawSortItems[i].cat ? "correct":"incorrect");
            }
          });
        });
      });
      document.getElementById("checkSort").onclick = ()=>{
        state.jigsawSortRevealed = true;
        activities.find(a=>a.id==="jigsaw").render(el);
      };

      ["central","peripheral","neural"].forEach(key=>{
        const card = document.getElementById(`card-${key}`);
        if(state.jigsawFlipped[key]){
          document.getElementById(`${key}-text`).textContent = jigsawContent[key];
          document.getElementById(`${key}-text`).classList.remove("hint");
        }
        card.addEventListener("click", ()=>{
          state.jigsawFlipped[key] = true;
          document.getElementById(`${key}-text`).textContent = jigsawContent[key];
          document.getElementById(`${key}-text`).classList.remove("hint");
        });
      });
      document.getElementById("jigsawAnswer").addEventListener("input",(e)=>{ state.jigsawAnswer = e.target.value; });
      document.getElementById("jigsawTransfer").addEventListener("input",(e)=>{ state.jigsawTransfer = e.target.value; });
    }
  },
  {
    id:"roleplay", title:"Coaching Role-Play", duration:10,
    render(el){
      const items = [
        "Breath-holding through the sticking point",
        "Facial flushing / visible straining",
        "Grunting or a catch in the breath",
        "Delayed exhale after the hardest part of the lift",
        "Rising perceived effort / tension in the face or neck"
      ];
      el.innerHTML = `
        <h2>6 · Coaching Role-Play</h2>
        <div class="meta">Pairs</div>
        <div class="panel">
          <h3>Setup — Dynamic Resistance</h3>
          <ul>
            <li>Partner A performs a bodyweight squat or resistance-band press.</li>
            <li>Partner B coaches breathing out loud: "exhale as you push."</li>
            <li>Halfway through, Partner A deliberately holds their breath / bears down (Valsalva) without announcing it — Partner B has to notice and correct it live.</li>
          </ul>
          <h3>Setup — Isometric Hold</h3>
          <ul>
            <li>Partner A now holds a wall sit or a sustained hard grip squeeze for 20–30 seconds.</li>
            <li>Partner B watches for the same Valsalva cues below, and notes whether they show up faster or more intensely than during the dynamic lift — the handout notes isometric resistance produces the most pronounced BP response.</li>
            <li>Swap roles when your instructor gives the signal.</li>
          </ul>
          <h3>Partner B: cues to watch for</h3>
          <div class="checklist" id="checklist">
            ${items.map((t,i)=>`<label><input type="checkbox" data-i="${i}" ${state.roleplayChecks[i]?"checked":""}> ${t}</label>`).join("")}
          </div>
        </div>
        <div class="prompt">Reflection: what did it feel like or look like when your partner started Valsalva-ing, and what cue tipped you off?</div>
        <textarea id="rpReflect" placeholder="Type your reflection here...">${state.rpReflect}</textarea>
        <div class="prompt" style="margin-top:14px;">Compare: what was different about the cues or intensity between the dynamic lift and the isometric hold?</div>
        <textarea id="rpCompare" placeholder="Type your comparison here...">${state.rpCompare}</textarea>
      `;
      document.getElementById("checklist").querySelectorAll("input").forEach(inp=>{
        inp.addEventListener("change",(e)=>{ state.roleplayChecks[e.target.dataset.i] = e.target.checked; });
      });
      document.getElementById("rpReflect").addEventListener("input",(e)=>{ state.rpReflect = e.target.value; });
      document.getElementById("rpCompare").addEventListener("input",(e)=>{ state.rpCompare = e.target.value; });
    }
  },
  {
    id:"exit", title:"Exit Ticket", duration:8,
    render(el){
      el.innerHTML = `
        <h2>7 · Exit Ticket</h2>
        <div class="meta">Individual &middot; formative, not graded</div>
        <div class="prompt">Your patient is a 68-year-old with a history of hypertension, starting a progressive resistance training program for the first time. In 2–3 sentences, describe what you would monitor during their first session and why — reference at least one <strong>acute cardiovascular response</strong> and one <strong>safety consideration specific to resistance exercise</strong>.</div>
        <textarea id="exitAnswer" placeholder="Type your response here...">${state.exitAnswer}</textarea>
        <div>
          <button class="action" id="copyExit">Copy My Response</button>
          <span id="copyStatus" style="font-size:12.5px;color:var(--muted);margin-left:8px;"></span>
        </div>
        <div class="prompt" style="margin-top:16px;">Submit this response the way your instructor requests (LMS, show-of-screen, etc.) — nothing here is saved automatically.</div>
        <div style="margin-top:20px;">
          <button class="ghost" id="stretchToggle">${state.exitStretchOpen ? "Hide" : "Finished early? Try a stretch case"}</button>
          <div id="stretchArea" style="${state.exitStretchOpen ? "" : "display:none;"} margin-top:12px;">
            <div class="prompt">A 24-year-old healthy athlete asks why holding their breath during a heavy back squat feels like it helps them lift more, but you discourage it. In 2–3 sentences, explain the physiology of what's actually happening to their blood pressure, and why you coach exhale-on-exertion instead.</div>
            <textarea id="exitStretchAnswer" placeholder="Type your response here...">${state.exitStretchAnswer}</textarea>
          </div>
        </div>
      `;
      const ta = document.getElementById("exitAnswer");
      ta.addEventListener("input",(e)=>{ state.exitAnswer = e.target.value; });
      document.getElementById("copyExit").onclick = ()=>{
        const text = ta.value;
        const status = document.getElementById("copyStatus");
        const showCopied = ()=>{ status.textContent = "Copied!"; setTimeout(()=>status.textContent="",1800); };
        const showManual = ()=>{ status.textContent = "Couldn't auto-copy — select the text above and copy manually."; };
        if(navigator.clipboard && window.isSecureContext){
          navigator.clipboard.writeText(text).then(showCopied).catch(showManual);
        } else {
          try{
            ta.focus();
            ta.setSelectionRange(0, ta.value.length);
            const ok = document.execCommand("copy");
            ok ? showCopied() : showManual();
          } catch(err){
            showManual();
          }
        }
      };
      document.getElementById("stretchToggle").onclick = ()=>{
        state.exitStretchOpen = !state.exitStretchOpen;
        activities.find(a=>a.id==="exit").render(el);
      };
      const stretchTa = document.getElementById("exitStretchAnswer");
      if(stretchTa){
        stretchTa.addEventListener("input",(e)=>{ state.exitStretchAnswer = e.target.value; });
      }
    }
  }
];

/* ---------------------------------------------------------
   Navigation
--------------------------------------------------------- */
let current = 0;

// First activity is open by default so students can start without a password.
state.unlocked[activities[0].id] = true;

const navList = document.getElementById("navList");
function renderNavList(){
  navList.innerHTML = activities.map((a,i)=>
    `<li data-i="${i}" class="${state.unlocked[a.id]?'':'locked'}"><span class="num">${i+1}</span><span>${a.title}</span><span class="lockmark">${state.unlocked[a.id]?'':'🔒'}</span></li>`
  ).join("");
  navList.querySelectorAll("li").forEach(li=>{
    li.addEventListener("click", ()=> goTo(+li.dataset.i));
  });
  renderNav();
}
function renderNav(){
  navList.querySelectorAll("li").forEach(li=>{
    li.classList.toggle("active", +li.dataset.i === current);
  });
}
renderNavList();

document.getElementById("prevBtn").addEventListener("click", ()=> goTo(current-1));
document.getElementById("nextBtn").addEventListener("click", ()=> goTo(current+1));

function renderLockScreen(container, activity){
  container.innerHTML = `
    <h2>${activity.title}</h2>
    <div class="meta">Locked</div>
    <div class="panel lock-panel">
      <div class="lock-icon">🔒</div>
      <p>This section is locked. Wait for your instructor to give the password when the lecture reaches this point.</p>
      <div class="lock-row">
        <input type="password" id="lockPass" placeholder="Enter password" autocomplete="off">
        <button class="action" id="unlockBtn">Unlock</button>
      </div>
      <div class="lock-error" id="lockError"></div>
    </div>
  `;
  function attemptUnlock(){
    const val = document.getElementById("lockPass").value.trim();
    if(val.toUpperCase() === activityPasswords[activity.id]){
      state.unlocked[activity.id] = true;
      renderNavList();
      activity.render(container);
    } else {
      document.getElementById("lockError").textContent = "Incorrect password — try again.";
    }
  }
  document.getElementById("unlockBtn").addEventListener("click", attemptUnlock);
  document.getElementById("lockPass").addEventListener("keydown", (e)=>{ if(e.key==="Enter") attemptUnlock(); });
}

function goTo(i){
  if(i<0 || i>=activities.length) return;
  current = i;
  const a = activities[current];
  document.getElementById("stepNum").textContent = current+1;
  document.getElementById("stepTotal").textContent = activities.length;
  const container = document.getElementById("screen");
  if(state.unlocked[a.id]){
    a.render(container);
  } else {
    renderLockScreen(container, a);
  }
  renderNav();
  document.getElementById("prevBtn").disabled = current===0;
  document.getElementById("nextBtn").disabled = current===activities.length-1;
  window.scrollTo(0,0);
}

goTo(0);
</script>
